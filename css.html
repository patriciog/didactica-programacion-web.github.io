<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <h1>CSS (Cascading Style Sheets)</h1>
    <p>CSS se encarga de la decoración y el aspecto visual de la estructura HTML. Permite separar el contenido de la presentación.</p>
    <p>Con CSS podemos cambiar:</p>
    <ul>
        <li>Colores y fondos.</li>
        <li>Tamaños de letra (Fuentes).</li>
        <li>Márgenes y alineación (Modelo de caja).</li>
    </ul>
</body>
</html>
